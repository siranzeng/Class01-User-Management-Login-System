<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">用户管理系统</div>
        <div class="navbar-menu">
            <a href="/page?name=help" class="navbar-link">帮助中心</a>
            {% if session.get('username') %}
                <span class="navbar-welcome">欢迎，{{ session.get('username') }}</span>
                <a href="/upload" class="navbar-link">上传头像</a>
                <a href="/profile" class="navbar-link">个人中心</a>
                <a href="/logout" class="navbar-link">退出</a>
            {% else %}
                <a href="/login" class="navbar-link">登录</a>
                <a href="/register" class="navbar-link">注册</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
