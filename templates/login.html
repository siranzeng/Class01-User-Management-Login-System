<!--
  ================================================================
  登录页面 - 安全修复版本 v2.0
  ────────────────────────────────────────────────────────────────
  安全变更：
    1. 新增 CSRF 隐藏 Token 字段，防止跨站请求伪造
    2. 统一错误提示"用户名或密码错误"，防止用户枚举
    3. 登录失败过多时提示账户锁定状态
  ────────────────────────────────────────────────────────────────
  调试信息（仅供开发参考，生产环境已移除明文泄露）：
    默认管理员 -> 用户名: admin
    默认普通用户 -> 用户名: alice
    密码已在数据库中哈希存储，无法通过页面泄露
  ================================================================
-->
{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">用户登录</h2>
    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary">登 录</button>
    </form>
</div>
{% endblock %}
