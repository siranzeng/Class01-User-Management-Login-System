<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>帮助中心</title></head>
<body style="font-family:sans-serif;max-width:700px;margin:40px auto;line-height:1.8">
<h1>帮助中心</h1>
<p>欢迎使用用户信息管理平台，这里是一些常见问题的解答。</p>
<h2>如何登录？</h2>
<p>在首页点击"登录"，输入用户名和密码即可。默认管理员账号为 admin，普通用户为 alice。</p>
<h2>怎么修改个人信息？</h2>
<p>目前系统暂不支持修改个人信息，如有需要请联系管理员处理。</p>
<h2>如何上传头像？</h2>
<p>登录后点击导航栏的"上传头像"，选择图片文件即可上传，支持 jpg、png、gif 等格式。</p>
<h2>怎么充值？</h2>
<p>登录后进入"个人中心"，在充值表单中输入金额，点击充值按钮即可增加余额。</p>
<h2>搜索功能怎么用？</h2>
<p>在首页的搜索框中输入用户名或邮箱关键字，点击搜索按钮即可查询用户信息。</p>
<p style="margin-top:40px;color:#888;font-size:14px">如有其他问题，请联系管理员。</p>
</body>
</html>
